<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DLRCGN | Music Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spotify-green { color: #1DB954; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center py-8 border-b border-gray-800 mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter spotify-green">DLRCGN.HUB</h1>
            <div id="auth-status" class="text-sm opacity-50 font-mono tracking-widest uppercase">Giriş Bekleniyor</div>
        </header>

        <div id="login-screen" class="flex flex-col items-center justify-center py-20 text-center">
            <h2 class="text-4xl font-bold mb-6 italic uppercase">Bağlan ve Başla</h2>
            <a href="/login" class="bg-[#1DB954] text-black font-black py-4 px-12 rounded-full hover:scale-105 transition shadow-lg">SPOTIFY İLE BAĞLAN</a>
        </div>

        <div id="main-content" class="hidden space-y-12">
            
            <section>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-6 rounded-3xl flex items-center space-x-4 border-l-4 border-green-500">
                        <div id="my-avatar" class="w-16 h-16 rounded-full bg-gray-800 bg-cover shadow-xl"></div>
                        <div class="flex-1 overflow-hidden">
                            <h4 class="font-bold text-lg">Çağan Kuzu</h4>
                            <p id="my-status" class="text-xs text-gray-400 italic truncate">Yükleniyor...</p>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-3xl flex items-center space-x-4 border-l-4 border-gray-800">
                        <div id="dilara-avatar" class="w-16 h-16 rounded-full bg-gray-800 bg-cover shadow-xl"></div>
                        <div class="flex-1 overflow-hidden">
                            <h4 class="font-bold text-lg text-gray-400">Dilara</h4>
                            <p id="dilara-status" class="text-xs text-gray-500 italic">Bağlanması bekleniyor...</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="space-y-6">
                <h3 class="text-xl font-bold opacity-80 italic underline decoration-green-500">Çalma Listelerin</h3>
                <div id="playlist-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </section>
        </div>
    </div>

    <script>
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');

        if (token) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('auth-status').innerText = "ONLINE ✅";
            document.getElementById('auth-status').classList.add('spotify-green');

            // 1. Profil Bilgilerini Çek
            fetch('https://api.spotify.com/v1/me', { 
                headers: { 'Authorization': `Bearer ${token}` } 
            })
            .then(res => res.json()).then(user => {
                if(user.images && user.images[0]) {
                    document.getElementById('my-avatar').style.backgroundImage = `url(${user.images[0].url})`;
                }
            });

            // 2. Çalma Listelerini Listele
            fetch('https://api.spotify.com/v1/me/playlists', { 
                headers: { 'Authorization': `Bearer ${token}` } 
            })
            .then(res => res.json()).then(data => {
                const plist = document.getElementById('playlist-list');
                data.items.forEach(pl => {
                    const img = pl.images && pl.images[0] ? pl.images[0].url : 'https://via.placeholder.com/150';
                    plist.innerHTML += `
                        <div class="glass p-3 rounded-2xl hover:bg-white/5 transition cursor-pointer" onclick="window.open('${pl.external_urls.spotify}', '_blank')">
                            <img src="${img}" class="rounded-xl mb-3 aspect-square object-cover">
                            <p class="truncate font-bold text-[10px] text-center uppercase tracking-tighter">${pl.name}</p>
                        </div>`;
                });
            });

            // 3. Şu An Ne Dinliyor Takibi (5 saniyede bir)
            setInterval(() => {
                fetch('https://api.spotify.com/v1/me/player/currently-playing', { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                })
                .then(res => res.status === 204 ? null : res.json())
                .then(data => {
                    const statusText = (data && data.item) ? `Dinliyor: ${data.item.name} - ${data.item.artists[0].name}` : "Şu an sessiz...";
                    document.getElementById('my-status').innerText = statusText;
                }).catch(() => {});
            }, 5000);
        }
    </script>
</body>
</html>
