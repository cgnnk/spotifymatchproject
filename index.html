<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spotify-green { color: #1DB954; }
        input::placeholder { color: #4b5563; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6 pb-32">
        <header class="flex justify-between items-center py-8 border-b border-gray-800 mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter spotify-green">DLRCGN.HUB</h1>
            <div id="auth-status" class="text-xs uppercase tracking-widest text-gray-500 font-bold">DISCONNECTED</div>
        </header>

        <div id="login-screen" class="flex flex-col items-center justify-center py-20 text-center">
            <a href="/login" class="bg-[#1DB954] text-black font-black py-4 px-12 rounded-full hover:scale-105 transition shadow-lg">GİRİŞ YAP VE BAŞLA</a>
        </div>

        <div id="main-content" class="hidden space-y-12">
            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl flex items-center space-x-4 border-l-4 border-green-500">
                    <div id="my-avatar" class="w-16 h-16 rounded-full bg-gray-800 bg-cover"></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-lg">Çağan</h4>
                        <p id="my-status" class="text-xs text-gray-400 italic">Sessiz...</p>
                    </div>
                </div>
                <div id="dilara-card" class="glass p-6 rounded-3xl flex items-center space-x-4 border-l-4 border-gray-700">
                    <div id="dilara-avatar" class="w-16 h-16 rounded-full bg-gray-800 bg-cover"></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-lg">Dilara</h4>
                        <p id="dilara-status" class="text-xs text-gray-400 italic">Henüz bağlanmadı...</p>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-8">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Şarkı ara ve çal..." 
                               class="w-full bg-gray-900 border border-gray-800 rounded-full py-4 px-6 focus:outline-none focus:border-green-500 transition">
                        <div id="search-results" class="absolute w-full mt-2 glass rounded-2xl z-50 overflow-hidden hidden"></div>
                    </div>
                    
                    <h3 class="text-xl font-bold opacity-80">Senin Favorilerin</h3>
                    <div id="track-list" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>

                <div class="glass p-6 rounded-3xl h-fit sticky top-6 text-center">
                    <img id="current-art" src="https://via.placeholder.com/300" class="rounded-2xl mb-4 shadow-2xl mx-auto">
                    <div id="current-name" class="font-bold truncate">...</div>
                    <div id="current-artist" class="text-gray-500 text-sm mb-6 italic">...</div>
                    <div class="flex justify-center space-x-6 items-center">
                        <button onclick="controlPlayer('previous')" class="text-gray-400 hover:text-white"><svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4a.5.5 0 0 1 1 0v3.248l6.267-3.636c.52-.302 1.233.043 1.233.696v7.384c0 .653-.713.998-1.233.696L5 8.752V12a.5.5 0 0 1-1 0V4z"/></svg></button>
                        <button id="toggle-btn" onclick="togglePlayback()" class="bg-white text-black p-4 rounded-full hover:scale-110 transition shadow-xl">
                            <svg id="play-svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z"/></svg>
                        </button>
                        <button onclick="controlPlayer('next')" class="text-gray-400 hover:text-white"><svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M12.5 4a.5.5 0 0 0-1 0v3.248L5.233 3.612C4.713 3.31 4 3.655 4 4.308v7.384c0 .653.713.998 1.233.696L11.5 8.752V12a.5.5 0 0 0 1 0V4z"/></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE AYARLARI ---
const firebaseConfig = {
  apiKey: "AIzaSyDeGgTl_FUeP7Hg5y5uEb3rPYGXU1SIcdA",
  authDomain: "spotifymatchproject.firebaseapp.com",
  projectId: "spotifymatchproject",
  storageBucket: "spotifymatchproject.firebasestorage.app",
  messagingSenderId: "525504631473",
  appId: "1:525504631473:web:6c6e2d56e531f966a58890",
  measurementId: "G-DFE0JP3FM0"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        let isPlaying = false;
        let myId = "";

        if (token) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            // 1. Kendi Bilgilerini Çek
            fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(user => {
                myId = user.id === "DİLARA_SPOTIFY_ID_BURAYA" ? "dilara" : "cagan";
                if(user.images[0]) document.getElementById('my-avatar').style.backgroundImage = `url(${user.images[0].url})`;
            });

            // 2. Canlı Takip & Veritabanı Yazma
            setInterval(() => {
                fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.json()).then(data => {
                    const status = data.item ? `Dinliyor: ${data.item.name}` : "Sessiz...";
                    document.getElementById('my-status').innerText = status;
                    
                    // Firebase'e yaz
                    db.ref('users/' + myId).set({
                        status: status,
                        art: data.item ? data.item.album.images[0].url : "",
                        last_updated: Date.now()
                    });

                    // UI Güncelle
                    if(data.item) {
                        document.getElementById('current-art').src = data.item.album.images[0].url;
                        document.getElementById('current-name').innerText = data.item.name;
                        document.getElementById('current-artist').innerText = data.item.artists[0].name;
                        isPlaying = data.is_playing;
                        updatePlayerIcon(isPlaying);
                    }
                });
            }, 3000);

            // 3. Dilara'yı Takip Et (Realtime)
            const otherId = myId === "cagan" ? "dilara" : "cagan";
            db.ref('users/' + otherId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('dilara-status').innerText = data.status;
                    document.getElementById('dilara-avatar').style.backgroundImage = `url(${data.art})`;
                    document.getElementById('dilara-card').classList.add('border-green-500');
                }
            });

            // 4. Şarkı Arama
            document.getElementById('search-input').addEventListener('input', (e) => {
                const q = e.target.value;
                if(q.length < 3) return;
                fetch(`https://api.spotify.com/v1/me/top/tracks2?q=${q}&type=track&limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => res.json()).then(data => {
                    const resDiv = document.getElementById('search-results');
                    resDiv.innerHTML = "";
                    resDiv.classList.remove('hidden');
                    data.tracks.items.forEach(t => {
                        resDiv.innerHTML += `
                            <div class="flex items-center p-3 hover:bg-white/10 cursor-pointer" onclick="playSong('${t.uri}')">
                                <img src="${t.album.images[2].url}" class="w-10 h-10 rounded mr-3">
                                <div><div class="font-bold text-sm">${t.name}</div><div class="text-xs text-gray-400">${t.artists[0].name}</div></div>
                            </div>`;
                    });
                });
            });
        }

        // --- PLAYER FONKSİYONLARI ---
        function playSong(uri) {
            fetch('https://api.spotify.com/v1/me/player/play', {
                method: 'PUT',
                body: JSON.stringify({ uris: [uri] }),
                headers: { 'Authorization': `Bearer ${token}` }
            });
            document.getElementById('search-results').classList.add('hidden');
        }

        function togglePlayback() {
            const endpoint = isPlaying ? 'pause' : 'play';
            fetch(`http://googleusercontent.com/spotify.com/${endpoint}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(() => {
                isPlaying = !isPlaying;
                updatePlayerIcon(isPlaying);
            });
        }

        function controlPlayer(action) {
            fetch(`http://googleusercontent.com/spotify.com/${action}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
        }

        function updatePlayerIcon(playing) {
            const btn = document.getElementById('play-svg');
            btn.innerHTML = playing ? 
                `<path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M5 6.25a1.25 1.25 0 1 1 2.5 0v3.5a1.25 1.25 0 1 1-2.5 0v-3.5zm3.5 0a1.25 1.25 0 1 1 2.5 0v3.5a1.25 1.25 0 1 1-2.5 0v-3.5z"/>` :
                `<path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z"/>`;
        }
    </script>
</body>
</html>
