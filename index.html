<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DLRCGN | Music Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #080808; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spotify-green { color: #1DB954; }
        .active-dot { width: 12px; height: 12px; background: #1DB954; border-radius: 50%; box-shadow: 0 0 15px #1DB954; position: absolute; top: 0; right: 0; border: 2px solid #080808; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6 pb-32">
        <header class="flex justify-between items-center py-8 mb-10 border-b border-gray-900">
            <h1 class="text-3xl font-black italic tracking-tighter spotify-green">DLRCGN.HUB</h1>
        </header>

        <div id="login-screen" class="flex flex-col items-center justify-center py-32 text-center">
            <h2 class="text-5xl font-black mb-8 italic uppercase">Müzik Paylaştıkça <span class="spotify-green">Güzel</span></h2>
            <a href="/login" class="bg-[#1DB954] text-black font-black py-4 px-16 rounded-full hover:scale-105 transition shadow-lg text-lg">GİRİŞ YAP</a>
        </div>

        <div id="main-content" class="hidden space-y-16">
            <section>
                <h3 class="text-xl font-bold mb-6 opacity-50 uppercase tracking-widest italic">Çevrimiçi Dinleyiciler</h3>
                <div id="user-cards" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    </div>
            </section>

            <section class="space-y-10">
                <h3 class="text-3xl font-black italic uppercase tracking-tighter">
                    <span class="spotify-green text-4xl mr-2">/</span> Çalma Listelerin
                </h3>
                <div id="playlist-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    </div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeGgTl_FUeP7Hg5y5uEb3rPYGXU1SIcdA",
            authDomain: "spotifymatchproject.firebaseapp.com",
            projectId: "spotifymatchproject",
            storageBucket: "spotifymatchproject.firebasestorage.app",
            messagingSenderId: "525504631473",
            appId: "1:525504631473:web:6c6e2d56e531f966a58890",
            measurementId: "G-DFE0JP3FM0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        let currentUserId = "";

        if (token) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            // 1. Profil Bilgisi Al ve Kaydet
            fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(user => {
                currentUserId = user.id;
                db.ref('presence/' + user.id).update({
                    name: user.display_name,
                    img: user.images && user.images[0] ? user.images[0].url : "https://via.placeholder.com/150",
                    online: true,
                    last_seen: Date.now()
                });
            });

            // 2. Şu An Ne Dinliyor? (Periyodik Güncelleme)
            setInterval(() => {
                fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.json())
                .then(data => {
                    const status = data.item ? `Dinliyor: ${data.item.name} - ${data.item.artists[0].name}` : "Şu an sessiz...";
                    db.ref('presence/' + currentUserId).update({
                        status: status,
                        playing: data.is_playing || false,
                        last_seen: Date.now()
                    });
                }).catch(e => console.log("Çalma bilgisi alınamadı"));
            }, 3000);

            // 3. Kartları Ekrana Bas (Real-time)
            db.ref('presence').on('value', (snapshot) => {
                const users = snapshot.val();
                const container = document.getElementById('user-cards');
                container.innerHTML = "";

                if (users) {
                    Object.keys(users).forEach(uid => {
                        const u = users[uid];
                        // Sadece son 2 dakika içinde aktif olanları göster
                        if (u.online && (Date.now() - u.last_seen < 120000)) {
                            container.innerHTML += `
                                <div class="glass p-6 rounded-[35px] flex items-center space-x-5 transition-all">
                                    <div class="w-20 h-20 rounded-full bg-cover bg-center relative shadow-2xl" style="background-image: url('${u.img}')">
                                        ${u.playing ? '<div class="active-dot"></div>' : ''}
                                    </div>
                                    <div class="flex-1 overflow-hidden">
                                        <h4 class="font-black text-xl italic uppercase truncate">${u.name}</h4>
                                        <p class="text-sm ${u.playing ? 'text-green-500 font-bold' : 'text-gray-500'} truncate italic">
                                            ${u.status || 'Bağlı'}
                                        </p>
                                    </div>
                                </div>`;
                        }
                    });
                }
            });

            // 4. Çalma Listelerini Çek
            fetch('https://api.spotify.com/v1/me/top/tracks3', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(data => {
                const plist = document.getElementById('playlist-list');
                if (data.items) {
                    data.items.slice(0, 10).forEach(pl => {
                        const img = pl.images && pl.images[0] ? pl.images[0].url : 'https://via.placeholder.com/300';
                        plist.innerHTML += `
                            <div class="glass p-3 rounded-[30px] group cursor-pointer hover:bg-white/5 transition" onclick="window.open('${pl.external_urls.spotify}', '_blank')">
                                <img src="${img}" class="w-full aspect-square rounded-[22px] mb-3 object-cover group-hover:scale-95 transition">
                                <p class="text-[10px] font-black uppercase text-center truncate px-2">${pl.name}</p>
                            </div>`;
                    });
                }
            });
        }
    </script>
</body>
</html>
