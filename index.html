<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotifyOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .spotify-card { background: #121212; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .spotify-card:hover { background: #181818; border-color: rgba(255, 255, 255, 0.15); }
        .progress-bar { height: 100%; background: #1DB954; transition: width 1s linear; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6 pb-32">
        <header class="flex justify-between items-center py-8 mb-10 border-b border-gray-900">
            <h1 class="text-3xl font-black italic tracking-tighter text-[#1DB954]">SpotifyOnline</h1>
            <div id="auth-info" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest hidden">Logged</div>
        </header>

        <div id="login-screen" class="flex flex-col items-center justify-center py-20 text-center">
            <h2 class="text-5xl font-black mb-8 italic uppercase tracking-tighter">Connect Wıth <span class="text-[#1DB954]">Spotıfy</span></h2>
            <a href="/login" class="bg-[#1DB954] text-black font-black py-4 px-12 rounded-full hover:scale-105 transition shadow-lg text-lg uppercase">Connect Wıth Spotıfy</a>
        </div>

        <div id="main-content" class="hidden space-y-12">
            <section>
                <h3 class="text-xs font-bold mb-8 opacity-40 uppercase tracking-[0.4em] italic">LİSTENERS</h3>
                <div id="user-cards" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeGgTl_FUeP7Hg5y5uEb3rPYGXU1SIcdA",
            authDomain: "spotifymatchproject.firebaseapp.com",
            databaseURL: "https://spotifymatchproject-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "spotifymatchproject",
            storageBucket: "spotifymatchproject.firebasestorage.app",
            messagingSenderId: "525504631473",
            appId: "1:525504631473:web:6c6e2d56e531f966a58890"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function formatTime(ms) {
            const mins = Math.floor(ms / 60000);
            const secs = ((ms % 60000) / 1000).toFixed(0);
            return mins + ":" + (secs < 10 ? '0' : '') + secs;
        }

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');

        if (token) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('auth-info').classList.remove('hidden');
            startApp(token);
        }

        async function startApp(t) {
            let currentUserId = "";

            fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${t}` } })
            .then(res => res.json()).then(user => {
                currentUserId = user.id;
                db.ref('presence/' + user.id).update({
                    name: user.display_name,
                    img: user.images[0]?.url || "https://via.placeholder.com/150",
                    online: true,
                    last_seen: Date.now()
                });
            });

            setInterval(() => {
                if(!currentUserId) return;
                fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${t}` } })
                .then(res => res.status === 204 ? null : res.json())
                .then(data => {
                    if (data && data.item) {
                        const track = data.item;
                        db.ref('presence/' + currentUserId).update({
                            playing: data.is_playing,
                            song_name: track.name,
                            artist_name: track.artists.map(a => a.name).join(', '),
                            album_img: track.album.images[0]?.url,
                            duration_ms: track.duration_ms,
                            progress_ms: data.progress_ms,
                            last_seen: Date.now()
                        });
                    } else {
                        db.ref('presence/' + currentUserId).update({ playing: false, last_seen: Date.now() });
                    }
                }).catch(() => {});
            }, 3000);

            db.ref('presence').on('value', (snap) => {
                const users = snap.val();
                const container = document.getElementById('user-cards');
                container.innerHTML = "";
                
                if(users) {
                    Object.keys(users).forEach(uid => {
                        const u = users[uid];
                        if(Date.now() - u.last_seen < 300000) {
                            const progress = u.playing ? (u.progress_ms / u.duration_ms * 100).toFixed(1) : 0;
                            const timeText = u.playing ? `${formatTime(u.progress_ms)} <span class="text-gray-600 px-1">/</span> ${formatTime(u.duration_ms)}` : "";
                            
                            container.innerHTML += `
                                <div class="spotify-card p-6 rounded-[28px] flex items-center justify-between shadow-2xl overflow-hidden">
                                    <div class="flex flex-col flex-1 pr-4 overflow-hidden space-y-4">
                                        
                                        <div class="flex items-center space-x-3">
                                            <img src="${u.img}" class="w-10 h-10 rounded-full border border-white/10 object-cover" />
                                            <h4 class="font-black text-xl italic uppercase truncate leading-none">${u.name}</h4>
                                        </div>

                                        ${u.playing ? `
                                            <div class="space-y-4">
                                                <div class="flex items-center overflow-hidden truncate">
                                                    <span class="text-gray-400 text-sm italic font-medium whitespace-nowrap">${u.artist_name}</span>
                                                    <span class="text-white mx-2 opacity-50">-</span>
                                                    <span class="text-[#1DB954] text-lg font-black uppercase truncate">${u.song_name}</span>
                                                </div>
                                                
                                                <div class="w-full space-y-2">
                                                    <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                                                        <div class="progress-bar" style="width: ${progress}%"></div>
                                                    </div>
                                                    <p class="text-[12px] text-white font-mono font-bold tracking-widest">${timeText}</p>
                                                </div>
                                            </div>
                                        ` : `
                                            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest italic">Inactive</p>
                                        `}
                                    </div>

                                    <div class="flex-shrink-0">
                                        <div class="w-28 h-28 md:w-32 md:h-32 rounded-2xl bg-cover bg-center shadow-xl border border-white/5" 
                                             style="background-image: url('${u.playing ? u.album_img : u.img}')">
                                        </div>
                                    </div>
                                </div>`;
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
