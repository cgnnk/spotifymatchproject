<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DLRCGN | Music Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #080808; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spotify-green { color: #1DB954; }
        .hidden { display: none; }
        .active-pulse { position: relative; }
        .active-pulse::after { content: ''; position: absolute; top: 0; right: 0; width: 12px; height: 12px; background: #1DB954; border-radius: 50%; border: 2px solid #080808; animate: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6 pb-32">
        <header class="flex justify-between items-center py-8 mb-10 border-b border-gray-900">
            <h1 class="text-3xl font-black italic tracking-tighter spotify-green">DLRCGN.HUB</h1>
            <div id="status-tag" class="text-[10px] px-3 py-1 rounded-full border border-gray-800 text-gray-500 font-bold uppercase tracking-widest">Offline</div>
        </header>

        <div id="login-screen" class="flex flex-col items-center justify-center py-32 text-center">
            <h2 class="text-6xl font-black mb-8 leading-tight">Müzik Ruhun <br><span class="spotify-green">Ortak Noktası.</span></h2>
            <a href="/login" class="bg-[#1DB954] text-black font-black py-5 px-16 rounded-full hover:scale-105 transition shadow-[0_0_30px_rgba(29,185,84,0.3)] text-xl">BAĞLAN</a>
        </div>

        <div id="main-content" class="hidden space-y-16">
            
            <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div id="card-cagan" class="glass p-8 rounded-[40px] flex items-center space-x-6 border-b-4 border-transparent transition-all duration-500">
                    <div id="avatar-cagan" class="w-24 h-24 rounded-full bg-gray-800 bg-cover shadow-2xl relative"></div>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-black text-2xl tracking-tight mb-1">Çağan Kuzu</h4>
                        <div id="status-cagan" class="text-sm text-gray-500 font-medium truncate">Henüz bir şey dinlemiyor...</div>
                    </div>
                </div>

                <div id="card-dilara" class="glass p-8 rounded-[40px] flex items-center space-x-6 border-b-4 border-transparent transition-all duration-500 opacity-40">
                    <div id="avatar-dilara" class="w-24 h-24 rounded-full bg-gray-800 bg-cover shadow-2xl relative"></div>
                    <div class="flex-1 overflow-hidden">
                        <h4 id="name-dilara" class="font-black text-2xl tracking-tight mb-1 text-gray-400">Dilara</h4>
                        <div id="status-dilara" class="text-sm text-gray-500 font-medium truncate italic">Bağlanması bekleniyor...</div>
                    </div>
                </div>
            </section>

            <div class="space-y-12">
                <div class="relative max-w-xl mx-auto">
                    <input type="text" id="search-input" placeholder="Müzik dünyasında ara..." 
                           class="w-full bg-gray-900 border border-gray-800 rounded-full py-5 px-8 focus:outline-none focus:border-green-500 transition-all text-lg font-medium">
                    <div id="search-results" class="absolute w-full mt-4 glass rounded-3xl z-50 overflow-hidden hidden shadow-2xl"></div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                    <div>
                        <h3 class="text-2xl font-black mb-8 flex items-center uppercase tracking-tighter">
                            <span class="spotify-green mr-3">#</span> Favori Şarkıların
                        </h3>
                        <div id="track-list" class="space-y-3"></div>
                    </div>
                    
                    <div>
                        <h3 class="text-2xl font-black mb-8 flex items-center uppercase tracking-tighter">
                            <span class="spotify-green mr-3">#</span> Çalma Listelerin
                        </h3>
                        <div id="playlist-list" class="grid grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
const firebaseConfig = {

  apiKey: "AIzaSyDeGgTl_FUeP7Hg5y5uEb3rPYGXU1SIcdA",

  authDomain: "spotifymatchproject.firebaseapp.com",

  projectId: "spotifymatchproject",

  storageBucket: "spotifymatchproject.firebasestorage.app",

  messagingSenderId: "525504631473",

  appId: "1:525504631473:web:6c6e2d56e531f966a58890",

  measurementId: "G-DFE0JP3FM0"

};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        const dilaraSpotifyID = "DILARA_ID_BURAYA"; // Buraya Dilara'nın ID'sini yaz!
        let myRole = "";

        if (token) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('status-tag').innerText = "Authorized";
            document.getElementById('status-tag').classList.add('text-green-500', 'border-green-900');

            // 1. Profil ve Kimlik Tespiti
            fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(user => {
                myRole = user.id === dilaraSpotifyID ? "dilara" : "cagan";
                const avatarEl = document.getElementById(`avatar-${myRole}`);
                if(user.images[0]) avatarEl.style.backgroundImage = `url(${user.images[0].url})`;
                
                // İlk Veriyi Yaz
                db.ref('presence/' + myRole).update({
                    name: user.display_name,
                    img: user.images[0] ? user.images[0].url : "",
                    online: true
                });
            });

            // 2. Canlı Şarkı Takibi (Her 5 saniyede bir)
            setInterval(() => {
                fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.json()).then(data => {
                    const statusText = data.item ? `Dinliyor: ${data.item.name} - ${data.item.artists[0].name}` : "Şu an bir şey dinlemiyor.";
                    const cardEl = document.getElementById(`card-${myRole}`);
                    const statusEl = document.getElementById(`status-${myRole}`);
                    
                    statusEl.innerText = statusText;
                    if(data.is_playing) {
                        cardEl.classList.add('border-green-500', 'bg-green-500/5');
                        document.getElementById(`avatar-${myRole}`).classList.add('active-pulse');
                    } else {
                        cardEl.classList.remove('border-green-500', 'bg-green-500/5');
                        document.getElementById(`avatar-${myRole}`).classList.remove('active-pulse');
                    }

                    // Firebase'e "Şu an ne dinliyor" bilgisini gönder
                    db.ref('presence/' + myRole).update({
                        status: statusText,
                        playing: data.is_playing || false,
                        last_updated: Date.now()
                    });
                });
            }, 5000);

            // 3. Diğer Kişiyi Dinle (Realtime)
            const otherRole = myRole === "cagan" ? "dilara" : "cagan";
            db.ref('presence/' + otherRole).on('value', (snap) => {
                const val = snap.val();
                if(val) {
                    const card = document.getElementById(`card-${otherRole}`);
                    const status = document.getElementById(`status-${otherRole}`);
                    const avatar = document.getElementById(`avatar-${otherRole}`);
                    const name = document.getElementById(`name-${otherRole}`);

                    if(name) name.innerText = val.name;
                    if(val.img) avatar.style.backgroundImage = `url(${val.img})`;
                    status.innerText = val.status;
                    
                    if(val.playing) {
                        card.classList.remove('opacity-40');
                        card.classList.add('border-green-500', 'bg-green-500/5');
                        avatar.classList.add('active-pulse');
                    } else {
                        card.classList.remove('border-green-500', 'bg-green-500/5');
                        avatar.classList.remove('active-pulse');
                    }
                }
            });

            // 4. Şarkı Arama
            document.getElementById('search-input').addEventListener('input', (e) => {
                const q = e.target.value;
                if(q.length < 3) return;
                fetch(`https://api.spotify.com/v1/me/top/tracks2?q=${q}&type=track&limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => res.json()).then(data => {
                    const resDiv = document.getElementById('search-results');
                    resDiv.innerHTML = "";
                    resDiv.classList.remove('hidden');
                    data.tracks.items.forEach(t => {
                        resDiv.innerHTML += `
                            <div class="flex items-center p-4 hover:bg-white/5 cursor-pointer border-b border-gray-800/50" onclick="window.open('${t.external_urls.spotify}', '_blank')">
                                <img src="${t.album.images[2].url}" class="w-10 h-10 rounded mr-4">
                                <div class="truncate"><div class="font-bold text-sm">${t.name}</div><div class="text-xs text-gray-500">${t.artists[0].name}</div></div>
                            </div>`;
                    });
                });
            });

            // 5. Favoriler & Çalma Listeleri (Statik veri çekimi)
            fetch('https://api.spotify.com/v1/me/top/tracks?limit=9', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(data => {
                const list = document.getElementById('track-list');
                data.items.slice(0, 5).forEach(t => {
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex items-center justify-between hover:bg-white/5 transition group cursor-pointer" onclick="window.open('${t.external_urls.spotify}', '_blank')">
                            <div class="flex items-center"><img src="${t.album.images[2].url}" class="w-10 h-10 rounded mr-4"><div class="truncate"><p class="font-bold text-sm">${t.name}</p><p class="text-xs text-gray-500">${t.artists[0].name}</p></div></div>
                            <div class="opacity-0 group-hover:opacity-100 transition spotify-green"><svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z"/></svg></div>
                        </div>`;
                });
            });

            fetch('https://api.spotify.com/v1/me/top/tracks3', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(data => {
                const plist = document.getElementById('playlist-list');
                data.items.slice(0, 4).forEach(pl => {
                    plist.innerHTML += `
                        <div class="glass p-4 rounded-3xl hover:border-green-500/50 transition cursor-pointer text-center" onclick="window.open('${pl.external_urls.spotify}', '_blank')">
                            <img src="${pl.images[0] ? pl.images[0].url : ''}" class="w-full aspect-square rounded-2xl mb-3 object-cover shadow-lg">
                            <p class="truncate font-bold text-xs">${pl.name}</p>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
