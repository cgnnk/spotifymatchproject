<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DLRCGN | Music Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #080808; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spotify-green { color: #1DB954; }
        .active-dot { width: 14px; height: 14px; background: #1DB954; border-radius: 50%; box-shadow: 0 0 15px #1DB954; position: absolute; top: 0; right: 0; border: 3px solid #080808; z-index: 10; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6 pb-32">
        <header class="flex justify-between items-center py-8 mb-10 border-b border-gray-900">
            <h1 class="text-3xl font-black italic tracking-tighter spotify-green">DLRCGN.HUB</h1>
        </header>

        <div id="main-content" class="space-y-16">
            <section>
                <h3 class="text-sm font-bold mb-6 opacity-40 uppercase tracking-[0.3em] italic text-center md:text-left">Aktif Dinleyiciler</h3>
                <div id="user-cards" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    </div>
            </section>

            <section class="space-y-10">
                <h3 class="text-3xl font-black italic uppercase tracking-tighter text-center md:text-left">
                    <span class="spotify-green text-4xl mr-2">/</span> Kitaplığın
                </h3>
                <div id="playlist-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </section>
        </div>
    </div>

    <script>
        // --- KRİTİK GÜNCELLEME: YENİ DATABASE URL ---
        const firebaseConfig = {
            apiKey: "AIzaSyDeGgTl_FUeP7Hg5y5uEb3rPYGXU1SIcdA",
            authDomain: "spotifymatchproject.firebaseapp.com",
            databaseURL: "https://spotifymatchproject-default-rtdb.europe-west1.firebasedatabase.app", // HATA BURADAYDI, DÜZELTİLDİ
            projectId: "spotifymatchproject",
            storageBucket: "spotifymatchproject.firebasestorage.app",
            messagingSenderId: "525504631473",
            appId: "1:525504631473:web:6c6e2d56e531f966a58890"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        let currentUserId = "";

        if (token) {
            document.getElementById('main-content').classList.remove('hidden');

            fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(user => {
                currentUserId = user.id;
                db.ref('presence/' + user.id).update({
                    name: user.display_name,
                    img: user.images && user.images[0] ? user.images[0].url : "https://via.placeholder.com/150",
                    last_seen: Date.now(),
                    online: true,
                    status: "Bağlandı ✅"
                });
            });

            setInterval(() => {
                if(!currentUserId) return;
                fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.status === 204 ? null : res.json())
                .then(data => {
                    const status = (data && data.item) ? `Dinliyor: ${data.item.name}` : "Şu an sessiz...";
                    db.ref('presence/' + currentUserId).update({
                        status: status,
                        playing: !!(data && data.is_playing),
                        last_seen: Date.now()
                    });
                }).catch(() => {});
            }, 3000);

            db.ref('presence').on('value', (snap) => {
                const users = snap.val();
                const container = document.getElementById('user-cards');
                container.innerHTML = "";
                if(users) {
                    Object.keys(users).forEach(uid => {
                        const u = users[uid];
                        if(Date.now() - u.last_seen < 600000) {
                            container.innerHTML += `
                                <div class="glass p-6 rounded-[35px] flex items-center space-x-5 shadow-2xl">
                                    <div class="w-20 h-20 rounded-full bg-cover bg-center relative border border-white/5" style="background-image: url('${u.img}')">
                                        ${u.playing ? '<div class="active-dot"></div>' : ''}
                                    </div>
                                    <div class="flex-1 overflow-hidden">
                                        <h4 class="font-black text-xl italic uppercase truncate tracking-tight">${u.name}</h4>
                                        <p class="text-sm ${u.playing ? 'text-green-500 font-bold' : 'text-gray-400'} truncate italic mt-1">${u.status}</p>
                                    </div>
                                </div>`;
                        }
                    });
                }
            });

            fetch('https://api.spotify.com/v1/me/playlists', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(data => {
                const plist = document.getElementById('playlist-list');
                if(data.items) {
                    data.items.forEach(pl => {
                        const img = pl.images && pl.images[0] ? pl.images[0].url : 'https://via.placeholder.com/300';
                        plist.innerHTML += `
                            <div class="glass p-3 rounded-[25px] group cursor-pointer hover:bg-white/5 transition" onclick="window.open('${pl.external_urls.spotify}', '_blank')">
                                <img src="${img}" class="w-full aspect-square rounded-[18px] mb-3 object-cover group-hover:scale-95 transition shadow-lg">
                                <p class="text-[10px] font-black uppercase text-center truncate px-2 text-gray-400">${pl.name}</p>
                            </div>`;
                    });
                }
            });
        }
    </script>
</body>
</html>
