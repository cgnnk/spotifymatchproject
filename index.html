<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DLRCGN | Music Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spotify-green { color: #1DB954; }
        input::placeholder { color: #4b5563; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6 pb-32">
        <header class="flex justify-between items-center py-8 border-b border-gray-800 mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter spotify-green">DLRCGN.HUB</h1>
            <div id="auth-status" class="text-xs uppercase tracking-widest text-gray-500 font-bold">GİRİŞ YAPILMADI</div>
        </header>

        <div id="login-screen" class="flex flex-col items-center justify-center py-32 text-center">
            <h2 class="text-5xl font-bold mb-8">Müziğinizi Birleştirin.</h2>
            <p class="text-gray-400 mb-10 max-w-md text-lg">Bağlanın, çalma listelerinizi görün ve Dilara ile ortak zevklerinizi keşfedin.</p>
            <a href="/login" class="bg-[#1DB954] text-black font-black py-5 px-16 rounded-full hover:scale-105 transition shadow-lg shadow-green-500/20 text-xl">SPOTIFY İLE BAĞLAN</a>
        </div>

        <div id="main-content" class="hidden space-y-16">
            
            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl flex items-center space-x-4 border-l-4 border-green-500 transition-all">
                    <div id="my-avatar" class="w-20 h-20 rounded-full bg-gray-800 bg-cover shadow-2xl border-2 border-gray-700"></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-xl uppercase tracking-tight">Çağan Kuzu</h4>
                        <p id="my-status" class="text-xs text-green-500 font-mono mt-1 italic italic">Spotify Bağlandı ✅</p>
                    </div>
                </div>
                <div id="dilara-card" class="glass p-6 rounded-3xl flex items-center space-x-4 border-l-4 border-gray-800 transition-all">
                    <div id="dilara-avatar" class="w-20 h-20 rounded-full bg-gray-800 bg-cover shadow-2xl"></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-xl uppercase tracking-tight text-gray-400">Dilara</h4>
                        <p id="dilara-status" class="text-xs text-gray-500 italic">Henüz giriş yapmadı...</p>
                    </div>
                </div>
            </section>

            <div class="space-y-8">
                <div class="relative max-w-2xl mx-auto">
                    <input type="text" id="search-input" placeholder="Bir şarkı ara..." 
                           class="w-full bg-gray-900 border border-gray-800 rounded-full py-5 px-8 focus:outline-none focus:border-green-500 transition-all text-lg shadow-2xl">
                    <div id="search-results" class="absolute w-full mt-3 glass rounded-3xl z-50 overflow-hidden hidden shadow-2xl"></div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div>
                        <h3 class="text-2xl font-bold mb-6 opacity-80 flex items-center">
                            <span class="mr-2 italic">En Çok Dinlediğin Şarkılar</span>
                            <span class="h-px flex-1 bg-gray-800 ml-4"></span>
                        </h3>
                        <div id="track-list" class="grid grid-cols-2 gap-4"></div>
                    </div>
                    
                    <div>
                        <h3 class="text-2xl font-bold mb-6 opacity-80 flex items-center">
                            <span class="mr-2 italic">Çalma Listelerin</span>
                            <span class="h-px flex-1 bg-gray-800 ml-4"></span>
                        </h3>
                        <div id="playlist-list" class="grid grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE AYARLARI ---
const firebaseConfig = {
  apiKey: "AIzaSyDeGgTl_FUeP7Hg5y5uEb3rPYGXU1SIcdA",
  authDomain: "spotifymatchproject.firebaseapp.com",
  projectId: "spotifymatchproject",
  storageBucket: "spotifymatchproject.firebasestorage.app",
  messagingSenderId: "525504631473",
  appId: "1:525504631473:web:6c6e2d56e531f966a58890",
  measurementId: "G-DFE0JP3FM0"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        let myId = "";

        if (token) {
            // Spotify Alanlarını Göster
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('auth-status').innerText = "BAĞLANDI";
            document.getElementById('auth-status').classList.replace('text-gray-500', 'text-green-500');

            // 1. Profil Bilgilerini Çek ve Firebase'e Kaydet
            fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(user => {
                myId = user.id === "DİLARA_ID_BURAYA" ? "dilara" : "cagan";
                if(user.images[0]) document.getElementById('my-avatar').style.backgroundImage = `url(${user.images[0].url})`;
                
                db.ref('users/' + myId).update({
                    name: user.display_name,
                    profile_pic: user.images[0] ? user.images[0].url : "",
                    online: true
                });
            });

            // 2. Favori Şarkıları Çek
            fetch('https://api.spotify.com/v1/me/top/tracks?limit=9', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(data => {
                const list = document.getElementById('track-list');
                data.items.slice(0, 6).forEach(track => {
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex items-center space-x-3 hover:bg-white/10 transition cursor-pointer" onclick="window.open('${track.external_urls.spotify}', '_blank')">
                            <img src="${track.album.images[2].url}" class="w-12 h-12 rounded-lg shadow-lg">
                            <div class="overflow-hidden">
                                <p class="truncate font-bold text-sm">${track.name}</p>
                                <p class="text-xs text-gray-500 truncate">${track.artists[0].name}</p>
                            </div>
                        </div>`;
                });
            });

            // 3. Çalma Listelerini Çek (Yeni!)
            fetch('https://api.spotify.com/v1/me/top/tracks3', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json()).then(data => {
                const plist = document.getElementById('playlist-list');
                data.items.slice(0, 6).forEach(pl => {
                    plist.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex items-center space-x-3 hover:bg-green-500/10 transition cursor-pointer border border-transparent hover:border-green-500/50" onclick="window.open('${pl.external_urls.spotify}', '_blank')">
                            <img src="${pl.images[0] ? pl.images[0].url : 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-lg shadow-lg">
                            <div class="overflow-hidden">
                                <p class="truncate font-bold text-sm">${pl.name}</p>
                                <p class="text-[10px] text-gray-500 uppercase tracking-tighter">${pl.tracks.total} Şarkı</p>
                            </div>
                        </div>`;
                });
            });

            // 4. Dilara'yı Takip Et
            const otherId = myId === "cagan" ? "dilara" : "cagan";
            db.ref('users/' + otherId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.online) {
                    document.getElementById('dilara-status').innerText = "Çevrimiçi";
                    document.getElementById('dilara-status').classList.replace('text-gray-500', 'text-green-500');
                    if(data.profile_pic) document.getElementById('dilara-avatar').style.backgroundImage = `url(${data.profile_pic})`;
                    document.getElementById('dilara-card').classList.replace('border-gray-800', 'border-green-500');
                }
            });

            // 5. Şarkı Arama Fonksiyonu
            document.getElementById('search-input').addEventListener('input', (e) => {
                const q = e.target.value;
                if(q.length < 3) return;
                fetch(`https://api.spotify.com/v1/me/top/tracks2?q=${q}&type=track&limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => res.json()).then(data => {
                    const resDiv = document.getElementById('search-results');
                    resDiv.innerHTML = "";
                    resDiv.classList.remove('hidden');
                    data.tracks.items.forEach(t => {
                        resDiv.innerHTML += `
                            <div class="flex items-center p-4 hover:bg-white/10 cursor-pointer border-b border-gray-800/50" onclick="window.open('${t.external_urls.spotify}', '_blank')">
                                <img src="${t.album.images[2].url}" class="w-12 h-12 rounded-lg mr-4 shadow-lg">
                                <div>
                                    <div class="font-bold text-white">${t.name}</div>
                                    <div class="text-sm text-gray-500">${t.artists[0].name}</div>
                                </div>
                            </div>`;
                    });
                });
            });
        }
    </script>
</body>
</html>
